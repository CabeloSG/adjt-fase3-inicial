spring.application.name=pagamento-service
server.port=8082

spring.datasource.url=jdbc:mysql://mysql:3306/pagamentodb
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Remover warning de Dialect (opcional)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jackson.serialization.write-dates-as-timestamps=false

# -------------------------
# KAFKA
# -------------------------

spring.kafka.bootstrap-servers=kafka:9092

spring.kafka.consumer.group-id=pagamento-service
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*

spring.kafka.consumer.properties.spring.json.use.type.headers=true

spring.kafka.producer.acks=all
spring.kafka.producer.retries=3

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.producer.properties.spring.json.add.type.headers=true

# -------------------------
# RESILIENCE4J
# -------------------------

resilience4j.circuitbreaker.instances.pagamentoExterno.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.pagamentoExterno.sliding-window-size=10
resilience4j.circuitbreaker.instances.pagamentoExterno.wait-duration-in-open-state=10s

resilience4j.retry.instances.pagamentoExterno.max-attempts=3
resilience4j.retry.instances.pagamentoExterno.wait-duration=2s

resilience4j.timelimiter.instances.pagamentoExterno.timeout-duration=5s